<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智能音量控制属性面板</title>
    <style>
      :root {
        --背景色: #16171d;
        --文字主色: #f3f4f6;
        --文字次色: #9ca3af;
        --主题色-起: #6366f1;
        --主题色-止: #06b6d4;
        --绿色-亮: #10b981;
        --边框色: rgba(255, 255, 255, 0.08);
        --卡片背景: rgba(255, 255, 255, 0.03);
        --字体:
          "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: transparent;
        color: var(--文字主色);
        font-family: var(--字体);
        font-size: 12px;
        line-height: 1.4;
        padding: 8px;
        height: 100vh;
        overflow-y: auto;
      }

      .面板-主容器 {
        background: var(--卡片背景);
        border: 1px solid var(--边框色);
        border-radius: 8px;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .面板-头部 {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .面板-标题 {
        font-size: 13px;
        font-weight: 600;
        color: #ffffff;
        letter-spacing: 0.3px;
      }

      .引导-容器 {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 4px;
        background: rgba(255, 255, 255, 0.01);
        padding: 6px;
        border-radius: 6px;
        border-left: 2px solid var(--主题色-起);
      }

      .引导-步骤 {
        display: flex;
        align-items: flex-start;
        gap: 6px;
        font-size: 11px;
        line-height: 1.4;
        color: var(--文字次色);
      }

      .步骤-文本 {
        flex: 1;
      }

      .设置-项 {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
        background: rgba(255, 255, 255, 0.02);
        padding: 8px;
        border-radius: 6px;
      }
      .设置-项 label {
        color: var(--文字次色);
      }
      .设置-项 select {
        flex: 1;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--边框色);
        color: var(--文字主色);
        padding: 4px 8px;
        border-radius: 4px;
        outline: none;
      }
      .设置-项 select option {
        background: var(--背景色);
        color: var(--文字主色);
      }
      .设置-项 button {
        background: var(--主题色-起);
        color: white;
        border: none;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
      <div class="设置-项">
        <label for="defaultAppSelect" data-lan="默认应用">默认应用</label>
        <select id="defaultAppSelect">
          <option value="系统主音量" data-lan="系统主音量">系统主音量</option>
        </select>
      </div>

      <div class="引导-容器">
        <div class="引导-步骤">
          <span class="步骤-文本" data-lan="说明1">直接旋转旋钮：调整系统全局主音量。</span>
        </div>
        <div class="引导-步骤">
          <span class="步骤-文本" data-lan="说明2">按下并旋转旋钮：调整当前前台应用音量。</span>
        </div>
        <div class="引导-步骤">
          <span class="步骤-文本" data-lan="说明3">双击旋钮：打开所有进程音量列表模式。</span>
        </div>
      </div>
    </div>
    <script>
      (function () {
        const 链接参数 = new URLSearchParams(window.location.search);
        const 语言字典 = {
          "zh_CN": {
            "标题": "智能音量控制",
            "默认应用": "默认应用",
            "系统主音量": "系统主音量",
            "说明1": "直接旋转旋钮：调整系统全局主音量。",
            "说明2": "按下并旋转旋钮：调整当前前台应用音量。",
            "说明3": "双击旋钮：打开所有进程音量列表模式。"
          },
          "en": {
            "标题": "Smart Volume Control",
            "默认应用": "Default App",
            "系统主音量": "Master Volume",
            "说明1": "Rotate knob: Adjust overall system volume.",
            "说明2": "Press & rotate knob: Adjust foreground app volume.",
            "说明3": "Double click knob: Open process volume list mode."
          }
        };

        let 语言设置 = "en";
        const 语言参数 = 链接参数.get("language");
        const 详情参数 = 链接参数.get("info");

        if (语言参数) {
          语言设置 = 语言参数;
        } else if (详情参数) {
          try {
            const 详情 = JSON.parse(详情参数);
            if (详情?.application?.language) {
              语言设置 = 详情.application.language;
            }
          } catch (错误) {}
        }

        const 是否为中文 = 语言设置.toLowerCase().startsWith("zh");
        const 目标语言 = 是否为中文 ? "zh_CN" : "en";
        const 当前语言包 = 语言字典[目标语言];

        document.querySelectorAll("[data-lan]").forEach((元素) => {
          const 键 = 元素.getAttribute("data-lan");
          if (当前语言包[键]) {
            元素.innerHTML = 当前语言包[键];
          }
        });

        // WebSocket 接口逻辑
        const urlParams = new URLSearchParams(window.location.search);
        const address = urlParams.get('address') || '127.0.0.1';
        const port = urlParams.get('port') || '3906';
        const actionUuid = urlParams.get('uuid') || '';
        const actionContext = urlParams.get('actionid') || 'default';
        const actionKey = urlParams.get('key') || '';
        
        let ws = null;
        let isConnected = false;

        function connect() {
            try {
                ws = new WebSocket(`ws://${address}:${port}`);
                ws.onopen = () => {
                    isConnected = true;
                    ws.send(JSON.stringify({
                        uuid: actionUuid,
                        cmd: 'connected',
                        code: 0
                    }));
                    setTimeout(requestActiveProcesses, 200);
                };
                ws.onmessage = (evt) => {
                    try {
                        const msg = JSON.parse(evt.data);
                        if (msg.cmd === 'sendToPropertyInspector') {
                            if (msg.payload && msg.payload.type === 'active_processes') {
                                updateSelect(msg.payload.apps, msg.payload.currentDefault);
                            } else if (msg.payload && msg.payload.type === 'default_app_changed') {
                                // check context
                                if (msg.actionid === actionContext) {
                                    const val = msg.payload.currentDefault || '系统主音量';
                                    const sel = document.getElementById('defaultAppSelect');
                                    if (!Array.from(sel.options).find(o => o.value === val)) {
                                        const opt = document.createElement('option');
                                        opt.value = val;
                                        opt.textContent = val === '系统主音量' && 当前语言包['系统主音量'] ? 当前语言包['系统主音量'] : val;
                                        sel.appendChild(opt);
                                    }
                                    sel.value = val;
                                }
                            }
                        }
                    } catch(e) {}
                };
                ws.onclose = () => {
                    isConnected = false;
                    setTimeout(connect, 3000);
                };
            } catch(e) {}
        }
        
        function requestActiveProcesses() {
            if (isConnected && ws) {
                ws.send(JSON.stringify({
                    cmd: 'sendToPlugin',
                    uuid: actionUuid,
                    key: actionKey,
                    actionid: actionContext,
                    payload: { command: 'get_active_processes' }
                }));
            }
        }
        
        document.getElementById('defaultAppSelect').addEventListener('mouseenter', () => {
            requestActiveProcesses();
        });
        
        document.getElementById('defaultAppSelect').addEventListener('change', (e) => {
            const val = e.target.value;
            if (isConnected && ws) {
                ws.send(JSON.stringify({
                    cmd: 'sendToPlugin',
                    uuid: actionUuid,
                    key: actionKey,
                    actionid: actionContext,
                    payload: { command: 'set_default_app', appName: val }
                }));
            }
        });

        connect();

        function updateSelect(apps, currentDefault) {
            const sel = document.getElementById('defaultAppSelect');
            const targetVal = currentDefault || '系统主音量';
            
            const allApps = new Set(apps);
            allApps.add(targetVal);
            if (!allApps.has('系统主音量')) {
                allApps.add('系统主音量');
            }
            
            const currentSet = new Set(Array.from(sel.options).map(o => o.value));
            
            for (let i = sel.options.length - 1; i >= 0; i--) {
                if (!allApps.has(sel.options[i].value)) {
                    sel.remove(i);
                }
            }
            
            for (const app of allApps) {
                if (!currentSet.has(app)) {
                    const opt = document.createElement('option');
                    opt.value = app;
                    opt.textContent = app === '系统主音量' && 当前语言包['系统主音量'] ? 当前语言包['系统主音量'] : app;
                    sel.appendChild(opt);
                }
            }
            
            if (sel.value !== targetVal) {
                sel.value = targetVal;
            }
        }
      })();
    </script>
  </body>
</html>
